  <canvas id="canvas" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const N = 120; // Ruudukon koko (N x N)
    let buffer1 = new Float32Array(N * N);
    let buffer2 = new Float32Array(N * N);
    let water = buffer1;
    let oldWater = buffer2;

    function stepWave() {
      let damping = 0.985;
      
      for (let y = 1; y < N - 1; y++) {
        for (let x = 1; x < N - 1; x++) {
          let i = x + y * N;
          
          // Matalan veden diskretoitu aalayhtälö (SWE-approksimaatio)
          water[i] = (
            oldWater[i - 1] +
            oldWater[i + 1] +
            oldWater[i - N] +
            oldWater[i + N]
          ) / 2.0 - water[i];

          water[i] *= damping;
        }
      }

      // Vaihdetaan puskurit
      let temp = oldWater;
      oldWater = water;
      water = temp;
    }

    // Renderöinti pikseleinä canvakselle
    const imgData = ctx.createImageData(N, N);

    function render() {
      stepWave();

      let data = imgData.data;
      for (let i = 0; i < N * N; i++) {
        let val = water[i];
        let colorIdx = i * 4;

        // Värikartta: syvänsininen -> kirkas syaani -> valkoinen huippu
        let intensity = Math.floor((val + 1.0) * 120);
        if (intensity < 0) intensity = 0;
        if (intensity > 255) intensity = 255;

        data[colorIdx]     = intensity * 0.1;   // Punainen
        data[colorIdx + 1] = intensity * 0.6;   // Vihreä
        data[colorIdx + 2] = intensity;         // Sininen
        data[colorIdx + 3] = 255;               // Alfa
      }

      ctx.putImageData(imgData, 0, 0);
      ctx.drawImage(canvas, 0, 0, N, N, 0, 0, canvas.width, canvas.height);

      requestAnimationFrame(render);
    }

    // Hiiri / Kosketusinteraktio
    let isDrawing = false;
    canvas.addEventListener('mousedown', (e) => { isDrawing = true; disturb(e); });
    canvas.addEventListener('mousemove', (e) => { if (isDrawing) disturb(e); });
    window.addEventListener('mouseup', () => { isDrawing = false; });

    function disturb(e) {
      const rect = canvas.getBoundingClientRect();
      let mouseX = Math.floor(((e.clientX - rect.left) / canvas.width) * N);
      let mouseY = Math.floor(((e.clientY - rect.top) / canvas.height) * N);

      // Pudotetaan "vesipisara" ruudukkoon
      for (let y = mouseY - 3; y <= mouseY + 3; y++) {
        for (let x = mouseX - 3; x <= mouseX + 3; x++) {
          if (x > 0 && x < N - 1 && y > 0 && y < N - 1) {
            oldWater[x + y * N] = 25.0; // Nostetaan veden korkeutta äkillisesti
          }
        }
      }
    }

    render();
  </script>
